name: Daily GitHub Trending Pipeline

on:
  schedule:
    # Runs daily at 08:00 UTC — auto mode decides snapshot vs report
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - snapshot
          - report

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      USE_DB: 'false'  # No database in GitHub Actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          python github_api_pipeline.py --mode $MODE

      - name: Commit and push results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/ reports/
          git diff --staged --quiet || (git commit -m "📊 $(if [ "$(date -u +%u)" = "1" ]; then echo "Weekly report"; else echo "Daily snapshot"; fi) — $(date -u +%Y-%m-%d)" && git push)
